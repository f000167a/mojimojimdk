<!DOCTYPE html>

<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プリンセス もじランド 👑</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@400;700;900&display=swap');
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;overscroll-behavior:none}
body{font-family:'Rounded Mplus 1c','Hiragino Maru Gothic Pro','Yu Gothic',sans-serif;min-height:100vh;background:linear-gradient(160deg,#FFF0F5 0%,#FDE2F3 25%,#F0E6FF 50%,#E8F4FD 75%,#FFF0F5 100%)}
::-webkit-scrollbar{height:4px}
::-webkit-scrollbar-thumb{background:#FFB6D9;border-radius:4px}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(85vh) rotate(540deg) scale(.5)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes sparkle{0%,100%{opacity:1;transform:scale(1) rotate(0)}50%{opacity:.6;transform:scale(1.3) rotate(180deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes praiseFloat{0%{opacity:0;transform:translate(-50%,10px) scale(.8)}20%{opacity:1;transform:translate(-50%,-5px) scale(1.1)}80%{opacity:1;transform:translate(-50%,-20px) scale(1)}100%{opacity:0;transform:translate(-50%,-40px) scale(.9)}}
@keyframes tiaraGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(255,215,0,.4))}50%{filter:drop-shadow(0 0 14px rgba(255,215,0,.8))}}
.app{padding:12px;position:relative;overflow:hidden;min-height:100vh}
.sparkle1{position:absolute;top:20px;left:10%;font-size:20px;animation:sparkle 3s infinite;pointer-events:none;opacity:.5}
.sparkle2{position:absolute;top:60px;right:8%;font-size:16px;animation:sparkle 4s infinite 1s;pointer-events:none;opacity:.4}
.tiara{font-size:28px;animation:tiaraGlow 2s infinite;margin-bottom:-8px;text-align:center}
.title{font-size:clamp(22px,6vw,34px);font-weight:900;margin:0 0 2px;background:linear-gradient(135deg,#FF69B4,#B388FF,#FF69B4,#FFD700);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:float 3s ease-in-out infinite;letter-spacing:3px;text-align:center}
.subtitle{font-size:13px;color:#C9A0DC;font-weight:700;text-align:center;margin-bottom:4px}
.mode-bar{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.mbtn{padding:10px 20px;border-radius:50px;font-size:clamp(14px,3.5vw,17px);font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit}
.mbtn-on{border:none;background:linear-gradient(135deg,#FF69B4,#B388FF);color:#fff;box-shadow:0 4px 15px rgba(255,105,180,.4)}
.mbtn-off{border:2px solid #FFD6EB;background:rgba(255,255,255,.8);color:#C9A0DC}
.gbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.gbtn{padding:8px 14px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .3s;font-family:inherit}
.cgrid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.cbtn{width:clamp(56px,15vw,68px);height:clamp(56px,15vw,68px);border-radius:18px;font-size:clamp(28px,7vw,36px);font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.card{background:rgba(255,255,255,.92);border-radius:24px;padding:16px;box-shadow:0 4px 24px rgba(255,105,180,.12);border:2px solid #FFE4F0;max-width:400px;margin:0 auto 16px;animation:popIn .4s ease-out}
.bigch{font-size:clamp(64px,18vw,100px);font-weight:900;line-height:1.1;animation:bounce 2s ease-in-out infinite;text-align:center}
.rom{font-size:clamp(18px,5vw,24px);color:#B388FF;font-weight:700;margin-bottom:6px;text-align:center}
.wbadge{font-size:clamp(13px,3.5vw,17px);color:#666;background:linear-gradient(135deg,#FFF0F5,#F0E6FF);display:inline-block;padding:8px 18px;border-radius:50px;border:1px solid #FFE4F0;font-weight:700;line-height:1.5}
.cwrap{position:relative;margin-top:14px}
.dlabel{text-align:center;font-size:14px;color:#C9A0DC;margin:0 0 8px;font-weight:700}
.dcnv{width:100%;max-width:340px;height:auto;aspect-ratio:1;background:linear-gradient(135deg,#FFF9FC,#FFF5F9);border-radius:20px;border:3px dashed #FFB6D9;touch-action:none;cursor:crosshair;display:block;margin:0 auto}
.clrbtn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.95);border:2px solid #FFB6D9;border-radius:50%;width:40px;height:40px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,105,180,.2)}
.pbar{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.pcol{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s}
.pswrap{margin-left:8px;display:flex;gap:6px;align-items:center}
.psz{border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qscores{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.qbox{background:rgba(255,255,255,.9);border-radius:16px;padding:8px 20px;box-shadow:0 2px 10px rgba(255,105,180,.15);border:2px solid #FFD6EB}
.qlbl{font-size:12px;color:#C9A0DC;font-weight:700}
.qsn{font-size:28px;font-weight:900;color:#FF69B4}
.qsk{font-size:28px;font-weight:900;color:#B388FF}
.qcard{background:rgba(255,255,255,.92);border-radius:24px;padding:24px;box-shadow:0 4px 20px rgba(255,105,180,.12);border:2px solid #FFD6EB;margin-bottom:16px;text-align:center}
.qp{font-size:15px;color:#C9A0DC;margin:0 0 4px;font-weight:700}
.qch{font-size:clamp(80px,20vw,120px);font-weight:900;line-height:1.2;color:#FF69B4;animation:bounce 2s ease-in-out infinite;text-shadow:0 4px 15px rgba(255,105,180,.2)}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qopt{padding:16px;border-radius:16px;border:3px solid #FFD6EB;background:rgba(255,255,255,.9);font-size:clamp(20px,5vw,28px);font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 10px rgba(255,105,180,.1);color:#666}
.qopt-ok{border-color:#FF69B4!important;background:linear-gradient(135deg,#FFF0F5,#FFE4F0)!important}
.bbtn{margin-top:16px;padding:10px 24px;border-radius:50px;border:2px solid #FFD6EB;background:rgba(255,255,255,.8);font-size:14px;cursor:pointer;font-family:inherit;color:#C9A0DC;font-weight:700}
.praise{position:fixed;top:30%;left:50%;font-size:clamp(20px,6vw,32px);font-weight:900;color:#FF69B4;text-shadow:0 2px 10px rgba(255,105,180,.3);animation:praiseFloat 2s ease-out forwards;z-index:150;pointer-events:none;white-space:nowrap}
.cft{position:fixed;top:-20px;font-size:18px;opacity:0;pointer-events:none;z-index:200}
.foot{text-align:center;padding:16px 0 8px;font-size:12px;color:#DDA0DD;font-weight:700}
</style>
</head>
