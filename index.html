// === HELPERS ===
function getGs(){return subMode==="hiragana"?HG:KG;}
function getChars(g){return g.slice(1);}
function allChars(){var a=[];getGs().forEach(function(g){a=a.concat(getChars(g));});return a;}
function allRom(){var o={};for(var k in R)o[R[k]]=1;return Object.keys(o);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function addFlower(lv,c){var big=lv>=3;var fl=big?BIG_FL:SMALL_FL;garden.push({emoji:fl[Math.floor(Math.random()*fl.length)],big:big,ch:c||""});saveG();}

// === CANVAS ===
function getPos(e){var r=cvs.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(CW/r.width),y:(t.clientY-r.top)*(CW/r.height)};}
function onDown(e){e.preventDefault();drawing=true;lastPt=getPos(e);}
function onMove(e){e.preventDefault();if(!drawing||!cvs)return;var x=cvs.getContext("2d"),p=getPos(e);x.strokeStyle=penCol;x.lineWidth=penSz*(CW/340);x.lineCap="round";x.lineJoin="round";x.beginPath();x.moveTo(lastPt.x,lastPt.y);x.lineTo(p.x,p.y);x.stroke();lastPt=p;hasStrokes=true;}
function onUp(e){e.preventDefault();drawing=false;lastPt=null;}
function initCanvas(id,guideChar){
  cvs=document.getElementById(id);if(!cvs)return;
  var x=cvs.getContext("2d");x.clearRect(0,0,CW,CW);
  x.strokeStyle="#F5D0E0";x.lineWidth=1;x.setLineDash([8,8]);
  x.beginPath();x.moveTo(CW/2,0);x.lineTo(CW/2,CW);x.moveTo(0,CW/2);x.lineTo(CW,CW/2);x.stroke();x.setLineDash([]);
  if(guideChar){var fs=Math.round(CW*0.65);x.font="600 "+fs+"px "+KF;x.fillStyle="rgba(255,182,217,.2)";x.textAlign="center";x.textBaseline="middle";x.fillText(guideChar,CW/2,CW/2+CW*0.02);}
  hasStrokes=false;
  cvs.addEventListener("mousedown",onDown);cvs.addEventListener("mousemove",onMove);cvs.addEventListener("mouseup",onUp);cvs.addEventListener("mouseleave",onUp);
  cvs.addEventListener("touchstart",onDown,{passive:false});cvs.addEventListener("touchmove",onMove,{passive:false});cvs.addEventListener("touchend",onUp,{passive:false});
}
function clearCanvas(guideChar){
  if(!cvs)return;var x=cvs.getContext("2d");x.clearRect(0,0,CW,CW);
  x.strokeStyle="#F5D0E0";x.lineWidth=1;x.setLineDash([8,8]);
  x.beginPath();x.moveTo(CW/2,0);x.lineTo(CW/2,CW);x.moveTo(0,CW/2);x.lineTo(CW,CW/2);x.stroke();x.setLineDash([]);
  if(guideChar){var fs=Math.round(CW*0.65);x.font="600 "+fs+"px "+KF;x.fillStyle="rgba(255,182,217,.2)";x.textAlign="center";x.textBaseline="middle";x.fillText(guideChar,CW/2,CW/2+CW*0.02);}
  hasStrokes=false;var ja=document.getElementById("judgeArea");if(ja)ja.innerHTML="";
}

// === JUDGE ===
function doJudge(tc){
  if(!cvs||!hasStrokes)return -1;
  var ref=document.getElementById("refCvs");ref.width=CW;ref.height=CW;
  var rx=ref.getContext("2d");rx.clearRect(0,0,CW,CW);
  var fs=Math.round(CW*0.65);rx.font="600 "+fs+"px "+KF;rx.fillStyle="#000";rx.textAlign="center";rx.textBaseline="middle";rx.fillText(tc,CW/2,CW/2+CW*0.02);
  var rD=rx.getImageData(0,0,CW,CW).data,dD=cvs.getContext("2d").getImageData(0,0,CW,CW).data;
  var rP=0,dP=0,ov=0,st=4;
  for(var i=0;i<rD.length;i+=4*st){var rA=rD[i+3]>30;var dA=dD[i+3],dR=dD[i];var isG=dA>10&&dA<120&&dR>200;var d=dA>40&&!isG;if(rA)rP++;if(d)dP++;if(rA&&d)ov++;}
  var lv=0;
  if(rP>0&&dP>0){var cov=ov/rP,prec=ov/dP,fS=cov*prec>0?2*cov*prec/(cov+prec):0,sp=dP/rP;
    if(fS>0.28&&cov>0.25)lv=3;else if(fS>0.18&&cov>0.15)lv=2;else if(cov>0.08||dP>rP*0.15)lv=1;if(sp>2.5)lv=Math.min(lv,1);}
  return lv;
}
function showResult(lv){
  judgeResult={level:lv};
  var el=document.getElementById("judgeArea");if(!el)return;
  var msgs=[["もういっかい！🌱","#C9A0DC"],["おしい！💪✨","#54A0FF"],["じょうず！🌸","#FF69B4"],["はなまる！🌟👑💖","#FFD700"]];
  var m=msgs[lv],stars="";
  for(var i=0;i<3;i++){if(i<lv)stars+="<span style=\"font-size:clamp(36px,8vw,48px);animation:popIn .4s ease-out "+(i*0.15)+"s both\">⭐</span>";else stars+="<span style=\"font-size:clamp(36px,8vw,48px);opacity:.3;filter:grayscale(1)\">⭐</span>";}
  el.innerHTML="<div style=\"animation:resultPop .4s;text-align:center;padding:16px 12px;background:rgba(255,255,255,.97);border-radius:20px;border:3px solid "+m[1]+";box-shadow:0 6px 30px "+m[1]+"55\"><div style=\"margin-bottom:4px\">"+stars+"</div><div style=\"font-size:clamp(16px,4vw,22px);font-weight:900;color:"+m[1]+"\">"+m[0]+"</div></div>";
}

// === CONFETTI ===
function doConfetti(){
  praise=rnd(PR);var cont=document.createElement("div");cont.id="confettiCont";
  for(var i=0;i<20;i++){var d=document.createElement("div");d.style.cssText="position:fixed;top:-20px;left:"+Math.random()*100+"%;font-size:18px;opacity:0;pointer-events:none;z-index:200;animation:confettiFall 2s ease-in "+Math.random()*0.5+"s forwards";d.textContent=rnd(SHP);cont.appendChild(d);}
  var p=document.createElement("div");p.style.cssText="position:fixed;top:30%;left:50%;font-size:clamp(20px,6vw,32px);font-weight:900;color:#FF69B4;text-shadow:0 2px 10px rgba(255,105,180,.3);animation:praiseFloat 2s ease-out forwards;z-index:150;pointer-events:none;white-space:nowrap";p.textContent=praise;cont.appendChild(p);
  document.body.appendChild(cont);if(cfTimer)clearTimeout(cfTimer);cfTimer=setTimeout(function(){var c=document.getElementById("confettiCont");if(c)c.remove();},2500);
}

// === QUIZ GEN ===
function genQuiz(){
  var all=allChars(),t=rnd(all);qCh=t;qRes=null;hasStrokes=false;judgeResult=null;
  if(page==="yomi"){var rv=R[t],opts=[rv],ar=allRom();while(opts.length<4){var x=rnd(ar);if(opts.indexOf(x)===-1)opts.push(x);}opts.sort(function(){return Math.random()-.5;});qOpts=opts;}
  else if(page==="moji"){var opts=[t];while(opts.length<4){var x=rnd(all);if(opts.indexOf(x)===-1)opts.push(x);}opts.sort(function(){return Math.random()-.5;});qOpts=opts;}
  else{qOpts=[];}
}
function advanceRenshu(){
  var g=getGs(),chars=getChars(g[grp]),idx=chars.indexOf(ch);
  if(idx<chars.length-1)ch=chars[idx+1];
  else if(grp<g.length-1){grp++;ch=getChars(g[grp])[0];}
  else{grp=0;ch=getChars(g[0])[0];}
  judgeResult=null;render();
}

function miniGardenHTML(){

  h+="<div style=\"position:absolute;top:4px;right:12px;font-size:16px\">☁️</div><div style=\"position:absolute;top:8px;left:16px;font-size:12px\">☁️</div>";
  var rc=garden.slice(-12);
  if(rc.length===0)h+="<div style=\"font-size:13px;color:#A5D6A7;font-weight:700;padding-top:4px\">🌱 もじを かいて おはなを さかせよう！</div>";
  else{h+="<div style=\"display:flex;justify-content:center;gap:2px;flex-wrap:wrap;position:relative;z-index:1\">";for(var i=0;i<rc.length;i++){var f=rc[i];h+="<div style=\"font-size:"+(f.big?"36px":"20px")+";line-height:1;animation:float "+(2+Math.random()*2)+"s ease-in-out "+(Math.random())+"s infinite\">"+f.emoji+"</div>";}h+="</div>";}
  h+="</div><div style=\"text-align:center;margin-top:10px\"><button data-showgarden=\"1\" style=\"padding:10px 24px;border-radius:50px;border:2px solid #A5D6A7;background:linear-gradient(135deg,#E8F5E9,#FFF9C4);font-size:clamp(14px,3.5vw,16px);font-weight:700;cursor:pointer;font-family:inherit;color:#66BB6A\">🌸 おはなばたけを みる ("+garden.length+"こ)</button></div>";
  return h;
}

// === RENDER ===
function render(){
  var app=document.getElementById("app"),h="";
  h+="<div style=\"position:absolute;top:20px;left:10%;font-size:20px;animation:sparkle 3s infinite;pointer-events:none;opacity:.5\">✨</div>";
  h+="<div style=\"position:absolute;top:60px;right:8%;font-size:16px;animation:sparkle 4s infinite 1s;pointer-events:none;opacity:.4\">💎</div>";
  // header
  h+="<div style=\"text-align:center;margin-bottom:6px\">";
  h+="<div style=\"font-size:28px;animation:tiaraGlow 2s infinite;margin-bottom:-8px\">👑</div>";
  h+="<div style=\"font-size:clamp(22px,6vw,34px);font-weight:900;margin:0 0 2px;background:linear-gradient(135deg,#FF69B4,#B388FF,#FF69B4,#FFD700);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:float 3s ease-in-out infinite;letter-spacing:3px\">プリンセス もじランド</div>";
  h+="<div style=\"font-size:13px;color:#C9A0DC;font-weight:700\">🌸 まほうの もじを おぼえよう！ 🌸</div></div>";

  // top nav (4 tabs)
  h+="<div style=\"display:flex;gap:5px;justify-content:center;margin:6px 0 10px;flex-wrap:wrap\">";
  var tabs=[["yomi","🔊 よみかた"],["moji","🔤 もじあて"],["renshu","📖 れんしゅう"]];
  for(var i=0;i<tabs.length;i++){var tb=tabs[i],ac=page===tb[0];
    h+="<button data-page=\""+tb[0]+"\" style=\"padding:9px 13px;border-radius:50px;font-size:clamp(12px,3vw,15px);font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;";
    if(ac)h+="border:none;background:linear-gradient(135deg,#FF69B4,#B388FF);color:#fff;box-shadow:0 4px 15px rgba(255,105,180,.4)";
    else h+="border:2px solid #FFD6EB;background:rgba(255,255,255,.8);color:#C9A0DC";
    h+="\">"+tb[1]+"</button>";}
  h+="</div>";

  // === GARDEN PAGE ===
  if(showGarden){
    h+="<div style=\"max-width:560px;margin:0 auto;text-align:center\">";
    h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:20px;border:2px solid #FFE4F0;margin-bottom:16px\">";
    h+="<div style=\"font-size:clamp(18px,4.5vw,24px);font-weight:900;color:#FF69B4;margin-bottom:4px\">🌸 おはなばたけ 🌸</div>";
    h+="<div style=\"font-size:12px;color:#C9A0DC;margin-bottom:12px\">じょうずに かけると おはなが さくよ！</div>";
    if(garden.length===0)h+="<div style=\"padding:30px;font-size:16px;color:#DDA0DD\">まだ おはなが ないよ<br>もじを かいて おはなを さかせよう！🌱</div>";
    else{h+="<div style=\"display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:8px\">";
      for(var i=0;i<garden.length;i++){var f=garden[i];h+="<div style=\"position:relative;width:"+(f.big?"64px":"42px")+";height:"+(f.big?"64px":"42px")+";display:flex;align-items:center;justify-content:center;font-size:"+(f.big?"42px":"22px")+";animation:popIn .3s ease-out "+(Math.min(i,30)*0.03)+"s both\">"+f.emoji;if(f.ch)h+="<span style=\"position:absolute;bottom:-2px;right:-2px;font-size:10px;background:rgba(255,255,255,.9);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:1px solid #FFE4F0;line-height:1\">"+f.ch+"</span>";h+="</div>";}
      h+="</div><div style=\"margin-top:10px;font-size:13px;color:#C9A0DC;font-weight:700\">🌷 ちいさい: "+garden.filter(function(f){return !f.big;}).length+" こ　🌸 おおきい: "+garden.filter(function(f){return f.big;}).length+" こ</div>";}
    h+="</div>";
    h+="<div style=\"display:flex;gap:10px;justify-content:center;margin-top:12px\">";
    h+="<button data-showgarden=\"0\" style=\"padding:10px 24px;border-radius:50px;border:2px solid #FFD6EB;background:rgba(255,255,255,.8);font-size:14px;cursor:pointer;font-family:inherit;color:#C9A0DC;font-weight:700\">🌸 もどる</button>";
    h+="<button data-greset=\"1\" style=\"padding:10px 20px;border-radius:50px;border:2px solid #FFD6EB;background:rgba(255,255,255,.8);font-size:12px;cursor:pointer;font-family:inherit;color:#C9A0DC;font-weight:700\">🗑️ リセット</button>";
    h+="</div></div>";

  // === QUIZ: YOMI / MOJI ===
  }else if(page==="yomi"||page==="moji"){
    h+="<div style=\"max-width:500px;margin:0 auto;text-align:center\">";
    // sub-mode toggle
    h+=subModeHTML();
    // scores
    h+=scoreHTML();
    if(page==="yomi"){
      h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:24px;border:2px solid #FFD6EB;margin-bottom:14px;animation:"+(qRes==="wrong"?"shake .5s":"popIn .4s")+"\">";
      h+="<div style=\"font-size:15px;color:#C9A0DC;font-weight:700\">🔊 このもじは な〜に？</div>";
      h+="<div style=\"font-family:"+KF+";font-size:clamp(80px,20vw,120px);font-weight:600;line-height:1.2;color:#FF69B4;animation:bounce 2s infinite\">"+qCh+"</div>";
      if(qRes==="correct")h+="<div style=\"font-size:22px;color:#FF69B4;font-weight:900;animation:popIn .3s\">"+praise+"</div>";
      h+="</div><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">";
      for(var i=0;i<qOpts.length;i++){var o=qOpts[i],ok=qRes&&o===R[qCh];
        h+="<button data-ans=\""+i+"\" style=\"padding:16px;border-radius:16px;border:3px solid "+(ok?"#FF69B4":"#FFD6EB")+";background:"+(ok?"linear-gradient(135deg,#FFF0F5,#FFE4F0)":"rgba(255,255,255,.9)")+";font-size:clamp(20px,5vw,28px);font-weight:700;cursor:pointer;font-family:inherit;color:#666\">"+o+"</button>";}
      h+="</div>";
    }else{
      h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:24px;border:2px solid #E8D5F5;margin-bottom:14px;animation:"+(qRes==="wrong"?"shake .5s":"popIn .4s")+"\">";
      h+="<div style=\"font-size:15px;color:#C9A0DC;font-weight:700\">🔤 「"+R[qCh]+"」は どのもじ？</div>";
      h+="<div style=\"font-size:clamp(48px,12vw,72px);font-weight:900;line-height:1.2;color:#B388FF;animation:bounce 2s infinite\">"+R[qCh]+"</div>";
      if(qRes==="correct")h+="<div style=\"font-size:22px;color:#FF69B4;font-weight:900;animation:popIn .3s\">"+praise+"</div>";
      h+="</div><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">";
      for(var i=0;i<qOpts.length;i++){var o=qOpts[i],ok=qRes&&o===qCh;
        h+="<button data-ans=\""+i+"\" style=\"padding:16px;border-radius:16px;border:3px solid "+(ok?"#B388FF":"#E8D5F5")+";background:"+(ok?"linear-gradient(135deg,#F0E6FF,#E8D5F5)":"rgba(255,255,255,.9)")+";font-size:clamp(32px,8vw,48px);font-weight:700;cursor:pointer;font-family:"+KF+";color:#666\">"+o+"</button>";}
      h+="</div>";
    }
    h+=miniGardenHTML()+"</div>";

  // === RENSHU ===
  }else{
    var g=getGs();if(!ch)ch=getChars(g[0])[0];
    // sub-mode toggle
    h+=subModeHTML();
    // group tabs
    h+="<div style=\"margin-bottom:10px\"><div style=\"display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 0 6px\">";
    for(var i=0;i<g.length;i++){var ac=grp===i;var isDk=g[i][0].charAt(0).match(/[がざだばぱガザダバパ]/);
      if(i>0&&isDk&&!g[i-1][0].charAt(0).match(/[がざだばぱガザダバパ]/))h+="</div><div style=\"text-align:center;font-size:11px;color:#C9A0DC;font-weight:700;padding:2px 0\">🌟 だくてん・はんだくてん 🌟</div><div style=\"display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:2px 0 4px\">";
      h+="<button data-grp=\""+i+"\" style=\"padding:7px 12px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;";
      if(ac)h+="background:linear-gradient(135deg,"+GC[i%GC.length]+","+GC[(i+1)%GC.length]+");color:#fff;border:none;box-shadow:0 3px 12px "+GC[i%GC.length]+"44";
      else h+="background:rgba(255,255,255,.7);color:#C9A0DC;border:2px solid #FFD6EB";
      h+="\">"+g[i][0]+"</button>";}
    h+="</div></div>";
    // char grid
    var chars=getChars(g[grp]);
    h+="<div style=\"display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px\">";
    for(var i=0;i<chars.length;i++){var c=chars[i],sl=ch===c,gc=GC[grp%GC.length];
      h+="<button data-ch=\""+i+"\" style=\"width:clamp(56px,15vw,68px);height:clamp(56px,15vw,68px);border-radius:18px;border:3px solid "+(sl?gc:"#FFE4F0")+";background:"+(sl?"#fff":"rgba(255,255,255,.7)")+";font-size:clamp(28px,7vw,36px);font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;color:"+(sl?gc:"#999")+";"+(sl?"animation:wiggle .5s;box-shadow:0 4px 15px "+gc+"44":"")+"\">"+c+"</button>";}
    h+="</div>";
    // detail card
    if(ch){var gc=GC[grp%GC.length];
      h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:16px;border:2px solid #FFE4F0;max-width:560px;margin:0 auto 16px;animation:popIn .4s\">";
      h+="<div style=\"text-align:center;margin-bottom:12px\">";
      h+="<div style=\"font-family:"+KF+";font-size:clamp(64px,18vw,100px);font-weight:600;line-height:1.1;animation:bounce 2s infinite;color:"+gc+"\">"+ch+"</div>";
      h+="<div style=\"font-size:clamp(18px,5vw,24px);color:#B388FF;font-weight:700;margin-bottom:6px\">"+R[ch]+"</div>";
      h+="<span style=\"font-size:clamp(13px,3.5vw,17px);color:#666;background:linear-gradient(135deg,#FFF0F5,#F0E6FF);display:inline-block;padding:8px 18px;border-radius:50px;border:1px solid #FFE4F0;font-weight:700\">"+(WD[ch]||ch)+"</span></div>";
      h+="<div style=\"text-align:center;font-size:14px;color:#C9A0DC;margin:0 0 8px;font-weight:700\">🪄 ゆびで まほうの もじを かこう！</div>";
      h+=canvasHTML("dc","#FFB6D9","#FFF9FC","#FFF5F9");
      h+="<div style=\"text-align:center;margin-top:12px\"><button data-judge=\"1\" style=\"padding:14px 32px;border-radius:50px;border:none;background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;font-size:clamp(16px,4vw,20px);font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(255,215,0,.4)\">🪄 まほうで チェック！</button></div>";
      h+=miniGardenHTML();
      h+="</div>";}
  }
  h+="<div style=\"text-align:center;padding:16px 0 8px;font-size:12px;color:#DDA0DD;font-weight:700\">👑 プリンセス もじランド 🌸</div>";
  app.innerHTML=h;
  // bind canvas
  if(page==="renshu"&&ch)initCanvas("dc",ch);
}

function subModeHTML(){
  var h="<div style=\"display:flex;gap:6px;justify-content:center;margin-bottom:10px\">";
  var cms=[["hiragana","ひらがな"],["katakana","カタカナ"]];
  for(var i=0;i<cms.length;i++){var c=cms[i],ac=subMode===c[0];
    h+="<button data-cm=\""+c[0]+"\" style=\"padding:6px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;";
    if(ac)h+="border:none;background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;box-shadow:0 2px 8px rgba(255,165,0,.3)";
    else h+="border:2px solid #FFE4A0;background:rgba(255,255,255,.8);color:#C9A0DC";
    h+="\">"+c[1]+"</button>";}
  return h+"</div>";
}
function scoreHTML(){
  return "<div style=\"display:flex;justify-content:center;gap:16px;margin-bottom:14px\"><div style=\"background:rgba(255,255,255,.9);border-radius:16px;padding:8px 20px;border:2px solid #FFD6EB\"><div style=\"font-size:12px;color:#C9A0DC;font-weight:700\">💎 スコア</div><div style=\"font-size:28px;font-weight:900;color:#FF69B4\">"+score+"</div></div><div style=\"background:rgba(255,255,255,.9);border-radius:16px;padding:8px 20px;border:2px solid #E8D5F5\"><div style=\"font-size:12px;color:#C9A0DC;font-weight:700\">🔥 れんぞく</div><div style=\"font-size:28px;font-weight:900;color:#B388FF\">"+streak+(streak>=5?" 👸":streak>=3?" 👑":streak>=2?" ✨":"")+"</div></div></div>";
}
function canvasHTML(id,bc,bg1,bg2){
  return "<div style=\"position:relative;max-width:"+CW+"px;margin:0 auto\"><canvas id=\""+id+"\" width=\""+CW+"\" height=\""+CW+"\" style=\"width:100%;max-width:"+CW+"px;height:auto;aspect-ratio:1;background:linear-gradient(135deg,"+bg1+","+bg2+");border-radius:20px;border:3px dashed "+bc+";touch-action:none;cursor:crosshair;display:block;margin:0 auto\"></canvas><button data-clear=\"1\" style=\"position:absolute;top:8px;right:8px;background:rgba(255,255,255,.95);border:2px solid "+bc+";border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10\">🗑️</button><div id=\"judgeArea\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;z-index:20;pointer-events:none\"></div></div>";
}

// === EVENT HANDLERS ===
document.getElementById("app").addEventListener("click",function(e){
  var t=e.target;while(t&&t!==this){if(t.dataset){
    if(t.dataset.page!==undefined){var p=t.dataset.page;if(p!==page){page=p;score=0;streak=0;judgeResult=null;showGarden=false;if(judgeTimer)clearTimeout(judgeTimer);if(p==="yomi"||p==="moji")genQuiz();if(p==="renshu"){grp=0;ch=null;}}render();return;}
    if(t.dataset.cm!==undefined){subMode=t.dataset.cm;grp=0;ch=null;if(page==="yomi"||page==="moji")genQuiz();render();return;}
    if(t.dataset.showgarden!==undefined){showGarden=t.dataset.showgarden==="1";render();return;}
    if(t.dataset.greset!==undefined){garden=[];saveG();render();return;}
    if(t.dataset.grp!==undefined){grp=parseInt(t.dataset.grp);ch=getChars(getGs()[grp])[0];judgeResult=null;if(judgeTimer)clearTimeout(judgeTimer);render();return;}
    if(t.dataset.ch!==undefined){ch=getChars(getGs()[grp])[parseInt(t.dataset.ch)];judgeResult=null;if(judgeTimer)clearTimeout(judgeTimer);render();return;}
    if(t.dataset.ans!==undefined){if(qRes)return;var a=qOpts[parseInt(t.dataset.ans)];var ok=(page==="yomi")?a===R[qCh]:a===qCh;
      if(ok){qRes="correct";score++;streak++;var qlv=Math.random()<0.33?3:2;addFlower(qlv,qCh);doConfetti();render();setTimeout(function(){genQuiz();render();},1400);}
      else{qRes="wrong";streak=0;render();setTimeout(function(){qRes=null;render();},1000);}return;}
    if(t.dataset.judge!==undefined){if(!ch)return;var lv=doJudge(ch);if(lv<0)return;showResult(lv);if(judgeTimer)clearTimeout(judgeTimer);
      if(lv>=2){addFlower(lv,ch);score++;streak++;doConfetti();judgeTimer=setTimeout(function(){advanceRenshu();},3800);}
      else{streak=0;judgeTimer=setTimeout(function(){clearCanvas(ch);},2500);}return;}
    if(t.dataset.clear!==undefined){if(judgeTimer)clearTimeout(judgeTimer);clearCanvas(ch);return;}
  }t=t.parentElement;}
});

if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){render();});}else{render();}
})();
</script>
</body>
</html>
