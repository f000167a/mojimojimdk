function DrawingCanvas({guideChar,penColor,penSize}){
const canvasRef=useRef(null),lastPt=useRef(null);
const [drawing,setDrawing]=useState(false);

const getPos=useCallback(function(ev){
const c=canvasRef.current,r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;
const t=ev.touches?ev.touches[0]:ev;
return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
},[]);

const drawGuide=useCallback(function(){
const c=canvasRef.current;if(!c)return;
const ctx=c.getContext(“2d”);
ctx.clearRect(0,0,c.width,c.height);
ctx.strokeStyle=”#F5D0E0”;ctx.lineWidth=1;ctx.setLineDash([6,6]);
ctx.beginPath();ctx.moveTo(c.width/2,0);ctx.lineTo(c.width/2,c.height);
ctx.moveTo(0,c.height/2);ctx.lineTo(c.width,c.height/2);ctx.stroke();ctx.setLineDash([]);
if(guideChar){ctx.font=“220px sans-serif”;ctx.fillStyle=“rgba(255,182,217,0.22)”;
ctx.textAlign=“center”;ctx.textBaseline=“middle”;ctx.fillText(guideChar,c.width/2,c.height/2+10);}
},[guideChar]);

useEffect(function(){drawGuide();},[guideChar,drawGuide]);

const start=useCallback(function(ev){ev.preventDefault();setDrawing(true);lastPt.current=getPos(ev);},[getPos]);
const move=useCallback(function(ev){ev.preventDefault();if(!drawing)return;
const c=canvasRef.current,ctx=c.getContext(“2d”),pos=getPos(ev),lp=lastPt.current;
ctx.strokeStyle=penColor;ctx.lineWidth=penSize;ctx.lineCap=“round”;ctx.lineJoin=“round”;
ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(pos.x,pos.y);ctx.stroke();lastPt.current=pos;
},[drawing,getPos,penColor,penSize]);
const end=useCallback(function(ev){ev.preventDefault();setDrawing(false);lastPt.current=null;},[]);

return e(“div”,{style:{position:“relative”}},
e(“canvas”,{ref:canvasRef,width:340,height:340,
onMouseDown:start,onMouseMove:move,onMouseUp:end,onMouseLeave:end,
onTouchStart:start,onTouchMove:move,onTouchEnd:end,
style:{width:“100%”,maxWidth:“340px”,height:“auto”,aspectRatio:“1”,
background:“linear-gradient(135deg,#FFF9FC,#FFF5F9)”,borderRadius:“20px”,
border:“3px dashed #FFB6D9”,touchAction:“none”,cursor:“crosshair”,display:“block”,margin:“0 auto”}}),
e(“button”,{onClick:function(){drawGuide();},style:{position:“absolute”,top:“8px”,right:“8px”,

alignItems:“center”,justifyContent:“center”,boxShadow:“0 2px 8px rgba(255,105,180,0.2)”}},“🗑️”)
);
}

function App(){

const [confetti,setConfetti]=useState(false);
const [penCol,setPenCol]=useState(”#FF69B4”);

const [quiz,setQuiz]=useState(false);
const [qChar,setQChar]=useState(null);
const [qOpts,setQOpts]=useState([]);
const [qRes,setQRes]=useState(null);
const [score,setScore]=useState(0);
const [streak,setStreak]=useState(0);
const [praise,setPraise]=useState(””);

const groups=mode===“hiragana”?HIRAGANA_GROUPS:KATAKANA_GROUPS;
const chars=groups[selGrp].chars;

useEffect(function(){if(!selCh)setSelCh(chars[0]);},[selGrp,mode]);

function doConfetti(){setConfetti(true);setPraise(PRAISE[Math.floor(Math.random()*PRAISE.length)]);setTimeout(function(){setConfetti(false);},2200);}

function genQuiz(){
var all=groups.flatMap(function(g){return g.chars;});
var t=all[Math.floor(Math.random()*all.length)],r=ROMAJI[t],opts=[r];
var ar=[…new Set(Object.values(ROMAJI))];
while(opts.length<4){var x=ar[Math.floor(Math.random()*ar.length)];if(opts.indexOf(x)===-1)opts.push(x);}
opts.sort(function(){return Math.random()-0.5;});
setQChar(t);setQOpts(opts);setQRes(null);
}

function startQuiz(){setQuiz(true);setScore(0);setStreak(0);setTimeout(genQuiz,0);}

function answer(a){
if(qRes)return;
if(a===ROMAJI[qChar]){setQRes(“correct”);setScore(function(s){return s+1;});setStreak(function(s){return s+1;});doConfetti();setTimeout(genQuiz,1400);}
else{setQRes(“wrong”);setStreak(0);setTimeout(function(){setQRes(null);},1000);}
}
